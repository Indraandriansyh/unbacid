kind = "web"
previewPath = "/"
title = "Universitas Nusa Bangsa"
version = "1.0.0"
id = "artifacts/unb-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25692
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/unb-website run dev"

[services.env]
PORT = "25692"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/unb-website", "run", "build"]
publicDir = "artifacts/unb-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
